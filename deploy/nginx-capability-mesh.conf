# Capability Mesh TLS reverse proxy example
# Replace capability-mesh.example.com and certificate paths before production use.

server {
    listen 443 ssl http2;
    server_name capability-mesh.example.com;

    ssl_certificate /etc/letsencrypt/live/capability-mesh.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capability-mesh.example.com/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
