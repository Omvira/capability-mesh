<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Capability Mesh Hub and Node architecture</title>
  <desc id="desc">A generic privacy-safe diagram showing a Hub coordinating public AgentCards, discovery, relay, policy, audit, MCP, and A2A-capable Nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7" opacity="0.75"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowRelay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.75"/>

  <text x="60" y="70" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Capability Mesh architecture</text>
  <text x="60" y="102" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Public capability discovery with private node execution</text>

  <path d="M 356 340 C 430 265, 484 225, 530 218" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
  <path d="M 844 340 C 770 265, 716 225, 670 218" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
  <path d="M 600 260 L 600 438" fill="none" stroke="#fb923c" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrowRelay)" opacity="0.95"/>
  <path d="M 390 460 C 470 540, 730 540, 810 460" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>

  <g filter="url(#shadow)">
    <rect x="450" y="145" width="300" height="165" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <rect x="450" y="145" width="300" height="165" rx="18" fill="rgba(8, 51, 68, 0.35)" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="190" fill="#e0f2fe" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700">Hub</text>
    <text x="600" y="220" fill="#bae6fd" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">registry · discovery · relay</text>
    <text x="600" y="247" fill="#bae6fd" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">policy · audit · MCP</text>
    <text x="600" y="278" fill="#94a3b8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Stores public AgentCards only</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="115" y="335" width="300" height="180" rx="18" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <rect x="115" y="335" width="300" height="180" rx="18" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="2"/>
    <text x="265" y="385" fill="#d1fae5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Node A</text>
    <text x="265" y="416" fill="#bbf7d0" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">A2A Server + A2A Client</text>
    <text x="265" y="446" fill="#a7f3d0" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">local adapters</text>
    <text x="265" y="477" fill="#94a3b8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Execution stays on the node</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="785" y="335" width="300" height="180" rx="18" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <rect x="785" y="335" width="300" height="180" rx="18" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="2"/>
    <text x="935" y="385" fill="#d1fae5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Node B</text>
    <text x="935" y="416" fill="#bbf7d0" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">A2A Server + A2A Client</text>
    <text x="935" y="446" fill="#a7f3d0" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">local adapters</text>
    <text x="935" y="477" fill="#94a3b8" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Can be behind NAT or firewall</text>
  </g>

  <g>
    <rect x="472" y="437" width="256" height="88" rx="14" fill="#1e293b" stroke="#fb923c" stroke-width="1.6" stroke-dasharray="7 6"/>
    <text x="600" y="472" fill="#fed7aa" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Relay path</text>
    <text x="600" y="499" fill="#fdba74" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12">preserves A2A semantics</text>
  </g>

  <g>
    <rect x="60" y="600" width="1080" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.4"/>
    <circle cx="92" cy="629" r="7" fill="#34d399"/>
    <text x="112" y="634" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Privacy boundary: diagrams use generic node names and public protocol concepts only. They intentionally omit hosts, IPs, usernames, credentials, local paths, memory, logs, and secrets.</text>
  </g>
</svg>
