<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Capability Mesh privacy boundary</title>
  <desc id="desc">A privacy-safe diagram showing which node fields are published and which private fields stay local.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7" opacity="0.75"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#grid)" opacity="0.75"/>

  <text x="60" y="70" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Privacy boundary</text>
  <text x="60" y="102" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Capability Mesh publishes capabilities, not private machine state.</text>

  <path d="M 430 335 L 755 335" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="592" y="315" fill="#bae6fd" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">public AgentCard projection</text>

  <g filter="url(#shadow)">
    <rect x="80" y="160" width="350" height="360" rx="20" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <rect x="80" y="160" width="350" height="360" rx="20" fill="rgba(6, 78, 59, 0.32)" stroke="#34d399" stroke-width="2"/>
    <text x="255" y="210" fill="#d1fae5" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700">Local Node</text>
    <text x="255" y="238" fill="#a7f3d0" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">private execution environment</text>

    <text x="115" y="286" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Stays local</text>
    <text x="115" y="322" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">memory</text>
    <text x="115" y="350" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">session history</text>
    <text x="115" y="378" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">raw logs and traces</text>
    <text x="115" y="406" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">environment variables</text>
    <text x="115" y="434" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">tokens and secrets</text>
    <text x="115" y="462" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">private commands and paths</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="755" y="160" width="365" height="360" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <rect x="755" y="160" width="365" height="360" rx="20" fill="rgba(8, 51, 68, 0.34)" stroke="#38bdf8" stroke-width="2"/>
    <text x="938" y="210" fill="#e0f2fe" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700">Hub registry</text>
    <text x="938" y="238" fill="#bae6fd" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">public discovery surface</text>

    <text x="790" y="286" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Published fields</text>
    <text x="790" y="322" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">node_id</text>
    <text x="790" y="350" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">display_name</text>
    <text x="790" y="378" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">public AgentCard URL</text>
    <text x="790" y="406" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">skills and capability labels</text>
    <text x="790" y="434" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">input/output modes</text>
    <text x="790" y="462" fill="#cbd5e1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">heartbeat-derived status</text>
  </g>

  <g>
    <rect x="80" y="570" width="1040" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.4"/>
    <circle cx="112" cy="599" r="7" fill="#fb7185"/>
    <text x="132" y="604" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Redaction and allow/deny filters apply to task results. Team or public skill contribution requires explicit human consent.</text>
  </g>
</svg>
